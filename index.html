<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        marked.setOptions({
        highlight: (code) => hljs.highlightAuto(code).value
        });
    </script>
</head>
<body>

    <div class="chatBot">
        <header>
            <h2>BULLYBOT</h2>
            <img src="Images/Angry Graduate Transparent.png" alt="LOGO" class="logo">
        </header>
        <div class="chatbox">
            <div class="chat-incoming chat">
                <p>What do you want me to cheat for you on this time? 😒</p>
            </div>
            <div id="chat-spacer"></div>
        </div>
        <div class="chat-input">
            <textarea rows="0" cols="17"
                    placeholder="Enter a message..."></textarea>
            <button id="sendBTN">^</button>
        </div>
    </div>
    <script src="secrets.js"></script>
    <script src="script.js" defer></script>
    <!--<script src="alternate.js" defer></script>-->
</body>

</html>
